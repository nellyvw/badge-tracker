<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Amazon Training Tracker – Badge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .badge-page-bg { background: linear-gradient(135deg, #e0e7ff 0%, #f0f4ff 40%, #ede9fe 100%); }
    .gradient-blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.5; animation: float 8s ease-in-out infinite; }
    .blob-1 { width: 300px; height: 300px; background: #a5b4fc; top: -50px; left: -50px; }
    .blob-2 { width: 250px; height: 250px; background: #c4b5fd; bottom: 30%; right: -60px; animation-delay: -3s; }
    .blob-3 { width: 200px; height: 200px; background: #67e8f9; bottom: -30px; left: 30%; animation-delay: -5s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -20px) scale(1.05); }
      66% { transform: translate(-10px, 15px) scale(0.95); }
    }
    .profile-enter { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .wheel-item { transform: scale(0.95); opacity: 0.85; transition: all 0.3s ease; }
    .wheel-item:hover { border-color: #6366f1 !important; transform: scale(1.01); opacity: 1; }
    .expired-pulse { animation: pulse-red 1.5s ease-in-out infinite; border-width: 2px; }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); background-color: rgba(254, 226, 226, 1); }
      50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); background-color: rgba(254, 202, 202, 1); }
    }
    .ring-glow-green { animation: glowGreen 2s ease-in-out infinite alternate; }
    .ring-glow-red { animation: glowRed 1.5s ease-in-out infinite alternate; }
    .ring-glow-amber { animation: glowAmber 2s ease-in-out infinite alternate; }
    @keyframes glowGreen { from { box-shadow: 0 0 8px rgba(34, 197, 94, 0.3); } to { box-shadow: 0 0 20px rgba(34, 197, 94, 0.6); } }
    @keyframes glowRed { from { box-shadow: 0 0 8px rgba(239, 68, 68, 0.3); } to { box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); } }
    @keyframes glowAmber { from { box-shadow: 0 0 8px rgba(245, 158, 11, 0.3); } to { box-shadow: 0 0 20px rgba(245, 158, 11, 0.5); } }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
<script>
  var ts = Date.now();
  document.write('<script src="associates-data.js?v=' + ts + '"><\/script>');
  document.write('<script src="process-training-data.js?v=' + ts + '"><\/script>');
</script>
<script>

const TRAININGS = [
  { id:1,  name:'Auto Pallet Wrapper',       category:'Annual',  days:365 },
  { id:2,  name:'Auto Slam',                 category:'Annual',  days:365 },
  { id:3,  name:'Destuff-IT',                category:'Annual',  days:365 },
  { id:4,  name:'Jam Clear',                 category:'Annual',  days:365 },
  { id:5,  name:'Robotic Pallet Wrapper',    category:'Annual',  days:365 },
  { id:6,  name:'Vacuum Lift',               category:'Annual',  days:365 },
  { id:7,  name:'VRC',                       category:'Annual',  days:365 },
  { id:8,  name:'TDR/GTDR',                  category:'Annual',  days:365 },
  { id:9,  name:'Yard',                      category:'Annual',  days:365 },
  { id:10, name:'PIT 101',                   category:'Annual',  days:365 },
  { id:11, name:'Fall Protection',           category:'Annual',  days:365 },
  { id:12, name:'Tugger (PTOW)',             category:'3-Year',  days:1095 },
  { id:13, name:'Electric Pallet Jack (EPJ)',category:'3-Year',  days:1095 },
  { id:14, name:'Order Picker (LO)',         category:'3-Year',  days:1095 },
  { id:15, name:'Sit Down (LF)',             category:'3-Year',  days:1095 },
  { id:16, name:'Stand Up (LF)',             category:'3-Year',  days:1095 },
  { id:17, name:'High Reach (LF)',           category:'3-Year',  days:1095 },
  { id:18, name:'Centre Rider',              category:'3-Year',  days:1095 },
  { id:19, name:'Turret Truck',              category:'3-Year',  days:1095 },
];

const PROCESS_CATEGORIES = {
  'ICQA': ['SBC', 'CC', 'SRC'],
  'Inbound': ['RSR', 'Dock', 'Receive', 'Stow', 'IB PS'],
  'Outbound': ['Pick', 'Pack', 'Sort', 'Ship', 'OB PS', 'VRET Pack'],
  'Other': ['VRC', 'KPP', 'Manual Slam', 'Auto Slam', 'Gift Wrap', 'Prep', 'Cubiscan', 'Waterspider']
};

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
}
function avatarColor(type) {
  return type === '3PTY' ? 'from-green-400 to-green-600' : 'from-blue-500 to-blue-700';
}
function avatarHtml(login, fullName, type) {
  const initials = getInitials(fullName);
  const color = avatarColor(type);
  return `<div class="w-16 h-16 rounded-full bg-gradient-to-br ${color} flex items-center justify-center text-white text-xl font-bold">${initials}</div>`;
}
function getStatus(expiryDate) {
  const today = new Date(); today.setHours(0,0,0,0);
  const expiry = new Date(expiryDate); expiry.setHours(0,0,0,0);
  const diff = Math.ceil((expiry - today) / 86400000);
  if (diff < 0) return { status:'expired', days: diff };
  if (diff <= 30) return { status:'expiring_soon', days: diff };
  return { status:'active', days: diff };
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-CA');
}
function buildAssocData(a) {
  const trainings = TRAININGS.map(t => {
    const rec = a.records[t.id];
    if (!rec) return { ...t, status:'not_trained', days:null, completed:null, expiry:null };
    const { status, days } = getStatus(rec.expiry);
    return { ...t, status, days, completed: rec.completed, expiry: rec.expiry };
  });
  const summary = {
    active: trainings.filter(t => t.status==='active').length,
    expiring_soon: trainings.filter(t => t.status==='expiring_soon').length,
    expired: trainings.filter(t => t.status==='expired').length,
    not_trained: trainings.filter(t => t.status==='not_trained').length,
  };
  return { ...a, trainings, summary };
}

function renderBadgePage(a) {
  const d = buildAssocData(a);
  const overall = d.summary.expired > 0 ? 'expired' : d.summary.expiring_soon > 0 ? 'expiring_soon' : 'active';
  const statusGlow = { expired: 'shadow-red-500/20', expiring_soon: 'shadow-amber-500/20', active: 'shadow-green-500/20' }[overall];
  const statusRing = { expired: 'ring-red-400', expiring_soon: 'ring-amber-400', active: 'ring-green-400' }[overall];
  const ringGlow = { expired: 'ring-glow-red', expiring_soon: 'ring-glow-amber', active: 'ring-glow-green' }[overall];
  const typeBadge = d.employment_type === '3PTY'
    ? `<span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-green-100 text-green-700 border border-green-300">Casual</span>`
    : `<span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-blue-100 text-blue-700 border border-blue-300">Full-Time</span>`;
  const pill = (n, lbl, cls) => n > 0 ? `<span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-semibold ${cls}"><span class="text-base font-bold">${n}</span>${lbl}</span>` : '';
  const annualTrainings = d.trainings.filter(t => t.category === 'Annual');
  const threeYearTrainings = d.trainings.filter(t => t.category !== 'Annual');

  const buildCard = (t) => {
    const statusColors = {
      active: { bg: 'bg-green-50', border: 'border-green-400', icon: '✓', iconColor: 'text-green-600' },
      expiring_soon: { bg: 'bg-amber-50', border: 'border-amber-300', icon: '⚠', iconColor: 'text-amber-600' },
      expired: { bg: 'bg-red-50', border: 'border-red-400', icon: '✕', iconColor: 'text-red-600' },
      not_trained: { bg: 'bg-gray-50', border: 'border-gray-200', icon: '—', iconColor: 'text-gray-400' }
    };
    const s = statusColors[t.status];
    const expiryInfo = t.status === 'not_trained' ? 'No record on file'
      : t.days < 0 ? `${Math.abs(t.days)} days overdue`
      : t.days === 0 ? 'Expires today'
      : `${t.days} days remaining`;
    const pulseClass = t.status === 'expired' ? 'expired-pulse' : '';
    return `<div class="wheel-item ${s.bg} border ${s.border} rounded-2xl p-5 shadow-sm ${pulseClass}">
      <div class="flex items-center gap-2 mb-2">
        ${t.status !== 'not_trained' ? `<span class="${s.iconColor} text-xl">${s.icon}</span>` : ''}
        <h3 class="font-bold text-gray-900 text-lg leading-tight">${t.name}</h3>
      </div>
      <p class="text-sm font-medium ${s.iconColor} mb-2">${expiryInfo}</p>
      <div class="text-sm text-gray-500 space-y-1">
        ${t.status !== 'not_trained' ? `<div>Completed: <span class="font-medium">${fmtDate(t.completed)}</span></div>
        <div>Expires: <span class="font-semibold">${fmtDate(t.expiry)}</span></div>` : ''}
      </div>
    </div>`;
  };

  const pd = (typeof PROCESS_TRAINING_DATA !== 'undefined') && PROCESS_TRAINING_DATA[a.login];
  let processHtml = '';
  if (pd && pd.processes.length > 0) {
    const categoryColors = {
      'ICQA': { bg: 'bg-blue-50', border: 'border-blue-200', chip: 'bg-blue-100 text-blue-700 border-blue-300' },
      'Inbound': { bg: 'bg-teal-50', border: 'border-teal-200', chip: 'bg-teal-100 text-teal-700 border-teal-300' },
      'Outbound': { bg: 'bg-orange-50', border: 'border-orange-200', chip: 'bg-orange-100 text-orange-700 border-orange-300' },
      'Other': { bg: 'bg-violet-50', border: 'border-violet-200', chip: 'bg-violet-100 text-violet-700 border-violet-300' }
    };
    const icons = { 'ICQA': '🔍', 'Inbound': '📦', 'Outbound': '🚚', 'Other': '⚙️' };
    processHtml = '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">';
    for (const [category, procs] of Object.entries(PROCESS_CATEGORIES)) {
      const trained = procs.filter(p => pd.processes.includes(p));
      const colors = categoryColors[category];
      processHtml += `<div class="${colors.bg} border ${colors.border} rounded-2xl p-5 shadow-sm">
        <h3 class="text-base font-bold mb-3">${icons[category]} ${category}</h3>
        <div class="flex flex-wrap gap-2">`;
      for (const proc of procs) {
        if (trained.includes(proc)) {
          processHtml += `<span class="inline-flex items-center gap-1 px-3 py-2 rounded-lg text-sm font-semibold ${colors.chip} border shadow-sm">✓ ${proc}</span>`;
        } else {
          processHtml += `<span class="inline-flex items-center px-3 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-400 border border-gray-200">${proc}</span>`;
        }
      }
      processHtml += '</div></div>';
    }
    processHtml += '</div>';
  } else {
    processHtml = '<div class="text-center py-8"><p class="text-gray-400">No process training recorded</p></div>';
  }

  return `<div class="min-h-screen badge-page-bg relative overflow-hidden">
    <div class="absolute inset-0 overflow-hidden">
      <div class="gradient-blob blob-1"></div>
      <div class="gradient-blob blob-2"></div>
      <div class="gradient-blob blob-3"></div>
    </div>
    <div class="relative z-10 max-w-7xl mx-auto px-4 py-6">
      <div class="text-center mb-2">
        <p class="text-xs text-gray-500 uppercase tracking-widest">Certification Status</p>
      </div>
      <div class="profile-enter bg-white/80 backdrop-blur-xl border border-white/60 rounded-3xl p-6 mb-6 shadow-xl ${statusGlow}">
        <div class="flex flex-col items-center text-center">
          <div class="ring-2 ${statusRing} ring-offset-2 ring-offset-transparent rounded-full mb-3 ${ringGlow}">
            ${avatarHtml(d.login, d.full_name, d.employment_type)}
          </div>
          <h1 class="text-3xl font-bold text-gray-900 mb-1">${d.full_name}</h1>
          <p class="text-gray-500 text-base font-mono mb-2">${d.login}</p>
          <div class="flex items-center gap-2 mb-3">${typeBadge}</div>
          <div class="flex flex-wrap justify-center gap-2">
            ${pill(d.summary.active,'Active','bg-green-100 text-green-700 border border-green-300')}
            ${pill(d.summary.expiring_soon,'Expiring','bg-amber-100 text-amber-700 border border-amber-300')}
            ${pill(d.summary.expired,'Expired','bg-red-100 text-red-700 border border-red-300')}
            ${pill(d.summary.not_trained,'Untrained','bg-gray-100 text-gray-500 border border-gray-300')}
          </div>
        </div>
      </div>
      <div class="flex justify-center gap-2 mb-4">
        <button onclick="switchTab('certs')" id="tab-certs" class="px-4 py-2 rounded-lg text-sm font-semibold bg-white/80 border border-indigo-300 text-indigo-700 shadow-sm">Certifications</button>
        <button onclick="switchTab('processes')" id="tab-processes" class="px-4 py-2 rounded-lg text-sm font-semibold bg-white/40 border border-gray-300 text-gray-500">Process Training</button>
      </div>
      <div id="content-certs">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <div>
            <h2 class="text-lg font-bold text-gray-700 uppercase tracking-wider mb-4 text-center bg-gray-200 border border-gray-300 py-2 rounded-xl">Annual Certifications</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">${annualTrainings.map(t => buildCard(t)).join('')}</div>
          </div>
          <div>
            <h2 class="text-lg font-bold text-gray-700 uppercase tracking-wider mb-4 text-center bg-gray-200 border border-gray-300 py-2 rounded-xl">3-Year Certifications</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">${threeYearTrainings.map(t => buildCard(t)).join('')}</div>
          </div>
        </div>
      </div>
      <div id="content-processes" class="hidden">${processHtml}</div>
      <p class="text-center text-[10px] text-gray-400 pt-4 pb-6">Amazon Training Tracker</p>
    </div>
  </div>`;
}

function switchTab(tab) {
  const certsTab = document.getElementById('tab-certs');
  const procsTab = document.getElementById('tab-processes');
  const certsContent = document.getElementById('content-certs');
  const procsContent = document.getElementById('content-processes');
  if (tab === 'certs') {
    certsTab.className = 'px-4 py-2 rounded-lg text-sm font-semibold bg-white/80 border border-indigo-300 text-indigo-700 shadow-sm';
    procsTab.className = 'px-4 py-2 rounded-lg text-sm font-semibold bg-white/40 border border-gray-300 text-gray-500';
    certsContent.classList.remove('hidden');
    procsContent.classList.add('hidden');
  } else {
    procsTab.className = 'px-4 py-2 rounded-lg text-sm font-semibold bg-white/80 border border-indigo-300 text-indigo-700 shadow-sm';
    certsTab.className = 'px-4 py-2 rounded-lg text-sm font-semibold bg-white/40 border border-gray-300 text-gray-500';
    procsContent.classList.remove('hidden');
    certsContent.classList.add('hidden');
  }
}

function handleRoute() {
  const hash = window.location.hash.slice(1);
  const app = document.getElementById('app');
  if (hash.startsWith('badge/')) {
    const login = hash.replace('badge/', '');
    const assoc = ASSOCIATES_DATA.find(a => a.login === login);
    if (assoc) {
      app.innerHTML = renderBadgePage(assoc);
    } else {
      app.innerHTML = `<div class="min-h-screen flex items-center justify-center"><div class="text-center"><p class="text-6xl mb-4">🔍</p><h1 class="text-2xl font-bold text-gray-900 mb-2">Associate not found</h1><p class="text-gray-500">Login "${login}" was not found in the system.</p></div></div>`;
    }
  } else {
    app.innerHTML = `<div class="min-h-screen flex items-center justify-center"><div class="text-center"><div class="w-16 h-16 bg-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-4"><svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div><h1 class="text-2xl font-bold text-gray-900 mb-2">Amazon Training Tracker</h1><p class="text-gray-500">Scan a QR code to view an associate's certifications.</p></div></div>`;
  }
}

window.addEventListener('DOMContentLoaded', handleRoute);
window.addEventListener('hashchange', handleRoute);
</script>
<div id="app"></div>
</body>
</html>
